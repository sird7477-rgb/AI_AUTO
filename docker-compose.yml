services:
  api:
    build: .
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      DATABASE_URL: postgresql://todo:todo@db:5432/todos
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: todos
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
