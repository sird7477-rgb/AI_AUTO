name: template-version-gate

# Server-side backstop for the AI_AUTO template version + patch-note rule
# (AGENTS.md commit-prep step 4). Unlike the local verify gate, this cannot be
# skipped with `git commit --no-verify`, so it enforces the rule regardless of
# which agent or contributor pushed and whether they ran verify.

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so check-template-version.sh can merge-base with main.
          fetch-depth: 0
      - name: Ensure main ref is available for the diff base
        run: git fetch origin main:main 2>/dev/null || git fetch origin main 2>/dev/null || true
      - name: shellcheck (scripts known-clean by local verify)
        run: shellcheck -S warning scripts/*.sh templates/automation-base/scripts/*.sh
      - name: template version + patch-note gate
        run: ./scripts/check-template-version.sh
